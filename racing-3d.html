<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing 3D - لعبة سيارات ثلاثية الأبعاد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ff00;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
        }

        .hud-item {
            margin: 8px 0;
            font-size: 14px;
        }

        .speed-bar {
            width: 150px;
            height: 8px;
            background: rgba(0, 100, 0, 0.5);
            border: 1px solid #0f0;
            margin-top: 5px;
            overflow: hidden;
        }

        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #ff6400);
            width: 0%;
            transition: width 0.1s;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 100;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: rgba(0, 255, 0, 0.4);
            box-shadow: 0 0 20px #00ff00;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-over-content {
            background: rgba(10, 10, 10, 0.95);
            padding: 40px;
            border: 3px solid #00ff00;
            border-radius: 10px;
            text-align: center;
        }

        .game-over-content h1 {
            font-size: 3em;
            color: #ff6400;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            #hud, #controls {
                font-size: 12px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="hud-item">
                <span>السرعة:</span>
                <span id="speedValue">0</span> كم/س
                <div class="speed-bar">
                    <div class="speed-fill" id="speedFill"></div>
                </div>
            </div>
            <div class="hud-item">
                <span>الموقع:</span>
                <span id="posValue">0, 0</span>
            </div>
        </div>

        <div id="controls">
            <div>W - للأمام | S - للخلف | A/D - التوجيه</div>
            <div>Space - كبح | Shift - سرعة فائقة</div>
            <button class="btn" onclick="goHome()" style="margin-top: 15px; width: 100%;">← الرئيسية</button>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-content">
                <h1>🏁 انتهت اللعبة!</h1>
                <p id="gameOverMessage">لقد وصلت إلى خط النهاية!</p>
                <button class="btn" onclick="resetGame()" style="margin-top: 20px;">لعبة جديدة</button>
                <button class="btn" onclick="goHome()" style="margin-top: 10px;">الرئيسية</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Car {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.angle = 0;
                this.speed = 0;
                this.maxSpeed = 12;
                this.acceleration = 0.3;
                this.friction = 0.92;
            }

            update(keys) {
                if (keys['w'] || keys['W']) {
                    this.vx += Math.cos(this.angle) * this.acceleration;
                    this.vy += Math.sin(this.angle) * this.acceleration;
                }
                if (keys['s'] || keys['S']) {
                    this.vx -= Math.cos(this.angle) * this.acceleration * 0.7;
                    this.vy -= Math.sin(this.angle) * this.acceleration * 0.7;
                }
                if (keys['a'] || keys['A']) {
                    this.angle -= 0.08;
                }
                if (keys['d'] || keys['D']) {
                    this.angle += 0.08;
                }
                if (keys[' ']) {
                    this.vx *= 0.85;
                    this.vy *= 0.85;
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                
                if (this.speed > this.maxSpeed) {
                    const scale = this.maxSpeed / this.speed;
                    this.vx *= scale;
                    this.vy *= scale;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = 0;
                if (this.x > 2000) this.x = 2000;
                if (this.y < 0) this.y = 0;
                if (this.y > 2000) this.y = 2000;
            }

            draw(ctx, cameraX, cameraY) {
                const screenX = this.x - cameraX;
                const screenY = this.y - cameraY;

                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(-15, -25, 30, 50);
                ctx.restore();
            }
        }

        const car = new Car(200, 200);
        let keys = {};
        let currentCheckpoint = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function gameLoop() {
            car.update(keys);

            const cameraX = car.x - canvas.width / 2;
            const cameraY = car.y - canvas.height / 2;

            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw track
            ctx.fillStyle = '#228B22';
            ctx.fillRect(-cameraX, -cameraY, 2000, 2000);

            // Draw road
            ctx.strokeStyle = '#666666';
            ctx.lineWidth = 150;
            ctx.beginPath();
            ctx.moveTo(200 - cameraX, 200 - cameraY);
            ctx.lineTo(1800 - cameraX, 200 - cameraY);
            ctx.lineTo(1800 - cameraX, 1800 - cameraY);
            ctx.lineTo(200 - cameraX, 1800 - cameraY);
            ctx.lineTo(200 - cameraX, 200 - cameraY);
            ctx.stroke();

            car.draw(ctx, cameraX, cameraY);

            document.getElementById('speedValue').textContent = Math.round(car.speed * 10);
            document.getElementById('speedFill').style.width = (car.speed / car.maxSpeed * 100) + '%';
            document.getElementById('posValue').textContent = Math.round(car.x) + ', ' + Math.round(car.y);

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            car.x = 200;
            car.y = 200;
            car.vx = 0;
            car.vy = 0;
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        gameLoop();
    </script>
</body>
</html>
