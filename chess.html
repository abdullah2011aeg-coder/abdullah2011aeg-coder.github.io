<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGG15 - شطرنج المحترفين</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            background-color: #262421;
            color: #bababa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
        }

        .header {
            width: 100%;
            background-color: #21201d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #81b64c;
        }

        .main-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #myBoard {
            width: 600px;
            max-width: 90vw;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .side-panel {
            width: 300px;
            background-color: #21201d;
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-box {
            background-color: #2b2926;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background-color: #312e2b;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            border-bottom: 3px solid #1a1917;
        }

        button:hover {
            background-color: #3c3934;
        }

        .btn-primary {
            background-color: #81b64c;
            border-bottom: 3px solid #5d8a32;
        }

        .btn-primary:hover {
            background-color: #95c95d;
        }

        /* تخصيص شكل مربعات Chess.com */
        .white-1e1d7 { background-color: #ebecd0 !important; }
        .black-3c85d { background-color: #779556 !important; }
        .highlight-mm { box-shadow: inset 0 0 3px 3px yellow; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ABGG15 CHESS</div>
        <div>أهلاً بك في عالم الاحتراف</div>
    </div>

    <div class="main-container">
        <div id="myBoard"></div>

        <div class="side-panel">
            <div class="status-box">
                <strong>الحالة:</strong> <span id="status">دور الأبيض</span>
            </div>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="resetGame()">مباراة جديدة</button>
                <button onclick="undoMove()">↩ تراجع عن الحركة</button>
                <button onclick="board.flip()">🔄 قلب الرقعة</button>
            </div>

            <div style="margin-top: 20px;">
                <label>تغيير الطور:</label>
                <select id="mode" style="width: 100%; padding: 5px; background: #312e2b; color: white;">
                    <option>لعب كلاسيكي</option>
                    <option>تحليل حركات</option>
                    <option>تدريب (ألغاز)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            // لا تسمح بتحريك القطع إذا انتهت اللعبة
            if (game.game_over()) return false;

            // لا تسمح بتحريك قطع الخصم
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }
