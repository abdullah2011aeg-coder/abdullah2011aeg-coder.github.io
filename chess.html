<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين - Modern Edition</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: rgba(23, 25, 35, 0.9);
            --accent: #00a2ff; /* Glass Blue */
            --white-sq: #dee3e6;
            --black-sq: #3b4249;
            --gold: #d5a021;
        }

        body { 
            background: radial-gradient(circle at center, #1a1c2c 0%, #0a0b10 100%);
            color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        .glass-header {
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status { font-size: 24px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }

        .board-container {
            position: relative;
            padding: 15px;
            background: #23272e;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 68px);
            grid-template-rows: repeat(8, 68px);
            border: 4px solid #1a1d23;
        }

        .square {
            width: 68px; height: 68px;
            display: flex; justify-content: center; align-items: center;
            font-size: 48px; cursor: pointer; transition: all 0.2s;
            position: relative;
        }

        .light { background: var(--white-sq); }
        .dark { background: var(--black-sq); }

        /* تأثير التحديد الحديث */
        .selected { 
            background: rgba(0, 162, 255, 0.5) !important;
            box-shadow: inset 0 0 15px var(--accent);
        }

        .hint::after {
            content: ''; width: 18px; height: 18px;
            background: rgba(0, 162, 255, 0.3); border-radius: 50%;
        }

        .piece {
            user-select: none; z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .piece:hover { transform: scale(1.15); }
        .white-p { color: #ffffff; }
        .black-p { color: #111; }

        .btn-modern {
            margin-top: 30px;
            padding: 12px 35px;
            background: var(--accent);
            color: white; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 162, 255, 0.4);
        }
