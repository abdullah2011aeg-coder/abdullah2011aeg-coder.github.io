<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGG15 - Chess World</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root {
            --bg-body: #262421;
            --bg-sidebar: #21201d;
            --chess-green: #81b64c;
            --sq-white: #ebecd0;
            --sq-black: #779556;
            --text-muted: #bababa;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-muted); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
        }

        /* القائمة الجانبية اليمنى */
        .sidebar { 
            width: 120px; 
            background-color: var(--bg-sidebar); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border-left: 1px solid #312e2b; 
            padding-top: 20px;
        }
        .logo { color: var(--chess-green); font-weight: bold; font-size: 20px; margin-bottom: 30px; }
        .nav-link { width: 100%; padding: 20px 0; text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-link:hover { background: #2b2926; color: #fff; }

        /* منطقة الرقعة (المنتصف) */
        .board-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background-color: #312e2b; 
            position: relative;
        }
        #chess-board { 
            width: 88vmin; 
            height: 88vmin; 
            max-width: 600px; 
            max-height: 600px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); 
        }

        /* لوحة التحليل (اليسار) */
        .analysis-panel { 
            width: 320px; 
            background-color: var(--bg-body); 
            border-right: 1px solid #312e2b; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
        }
        .panel-title { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .move-history { 
            flex: 1; 
            background: var(--bg-sidebar); 
            border-radius: 4px; 
            padding: 15px; 
            font-size: 13px; 
            color: #777; 
            overflow-y: auto;
        }

        /* ألوان مربعات Chess.com */
        .white-1e1d7 { background-color: var(--sq-white) !important; }
        .black-3c85d { background-color: var(--sq-black) !important; }

        /* هوية اللاعبين */
        .player-info { width: 88vmin; max-width: 600px; display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px; }
        .avatar { width: 32px; height: 32px; background: #454241; border-radius: 3px; }

        .btn-action {
            margin-top: 15px;
            background: var(--chess-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 4px solid #5d8a32;
        }
        .btn-action:hover { background: #95c95d; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ABGG15</div>
        <div class="nav-link">♟ العب</div>
        <div class="nav-link">🧩 الألغاز</div>
        <div class="nav-link">🎓 تعلّم</div>
        <div class="nav-link">📺 مشاهدة</div>
    </div>

    <div class="analysis-panel">
        <div class="panel-title">🔍 تحليل</div>
        <div class="move-history" id="history">
            بانتظار الحركة الأولى...
        </div>
        <button class="btn-action" onclick="resetGame()">مباراة جديدة</button>
        <button style="background:#312e2b; border-bottom:4px solid #1a1917;" class="btn-action" onclick="undoMove()">↩ تراجع</button>
    </div>

    <div class="board-section">
        <div class="player-info">
            <div class="avatar"></div> <strong>الخصم (كمبيوتر)</strong>
        </div>

        <div id="chess-board"></div>

        <div class="player-info">
            <div class="avatar" style="background: #fff;"></div> <strong>أنت (ABGG15)</strong>
        </div>
    </div>

<script>
    var board = null;
    var game = new Chess();
    var historyElement = document.getElementById('history');

    function onDragStart (source, piece) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    }

    function onDrop (source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateHistory();
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    function updateHistory() {
        historyElement.innerHTML = game.pgn().split(' ').join('<br>');
    }

    function resetGame() {
        game.reset();
        board.start();
        historyElement.innerHTML = 'بانتظار الحركة الأولى...';
    }

    function undoMove() {
        game.undo();
        board.position(game.fen());
        updateHistory();
    }

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };

    board = Chessboard('chess-board', config);
    $(window).resize(board.resize);
</script>
</body>
</html>
