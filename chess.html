<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين الذكي</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .status { margin-bottom: 10px; font-size: 24px; color: #d5a021; }
        .board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 5px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; transition: 0.2s; }
        .white-sq { background: #ebecd0; }
        .black-sq { background: #779556; }
        .selected { background: #f3cf2b !important; }
        .valid-move { background: rgba(133, 243, 43, 0.6) !important; box-shadow: inset 0 0 10px #000; }
        .piece { transition: transform 0.3s ease; user-select: none; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #d5a021; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status" id="status">دور اللاعب: الأبيض ⚪</div>
    <div class="board" id="board"></div>
    <div class="controls">
        <button onclick="location.reload()">إعادة اللعبة 🔄</button>
        <button onclick="window.location.href='index.html'">الرجوع لـ X-O 🔙</button>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let selectedSquare = null;
        let turn = 'w';

        // قطع الشطرنج باستخدام الرموز لضمان عدم ظهور شاشة بيضاء
        const pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        let boardLayout = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    const piece = boardLayout[r][c];
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.innerText = pieces[piece];
                        pieceDiv.style.color = piece === piece.toUpperCase() ? "white" : "black";
                        square.appendChild(pieceDiv);
                    }

                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            const clickedPiece = boardLayout[r][c];
            
            if (selectedSquare) {
                const [sr, sc] = selectedSquare;
                // تنفيذ الحركة
                boardLayout[r][c] = boardLayout[sr][sc];
                boardLayout[sr][sc] = '';
                selectedSquare = null;
                turn = turn === 'w' ? 'b' : 'w';
                statusElement.innerText = turn === 'w' ? "دور اللاعب: الأبيض ⚪" : "دور اللاعب: الأسود ⚫";
                createBoard();
            } else {
                if (clickedPiece && ((turn === 'w' && clickedPiece === clickedPiece.toUpperCase()) || (turn === 'b' && clickedPiece === clickedPiece.toLowerCase()))) {
                    selectedSquare = [r, c];
                    createBoard();
                    const idx = r * 8 + c;
                    boardElement.children[idx].classList.add('selected');
                }
            }
        }

        createBoard();
    </script>
</body>
</html>
