<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين - الإصدار النهائي</title>
    <style>
        :root {
            --bg: #312e2b;
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --highlight: rgba(246, 246, 105, 0.8);
            --hint: rgba(0, 0, 0, 0.1);
        }

        body { 
            background-color: var(--bg); margin: 0; 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* حاوية الرقعة مع زوايا منحنية كما في Chess.com */
        .board-wrapper {
            position: relative;
            width: 92vmin; height: 92vmin;
            max-width: 750px; max-height: 750px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%; height: 100%;
        }

        .square {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .light { background-color: var(--white-sq); }
        .dark { background-color: var(--black-sq); }

        /* تنسيق الإحداثيات (الأرقام والحروف) داخل المربعات */
        .square::before {
            position: absolute; font-size: 1.5vmin; font-weight: bold; z-index: 1;
        }
        .square[data-r]::before { content: attr(data-r); left: 3px; top: 1px; }
        .square[data-c]::before { content: attr(data-c); right: 3px; bottom: 1px; }
        
        .light::before { color: var(--black-sq); }
        .dark::before { color: var(--white-sq); }

        /* قطع الشطرنج Neo */
        .piece {
            width: 95%; height: 95%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
        }

        /* روابط القطع من سورس Chess.com الرسمي */
        .wp { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wp.png'); }
        .wr { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wr.png'); }
        .wn { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wn.png'); }
        .wb { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wb.png'); }
        .wq { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wq.png'); }
        .wk { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wk.png'); }

        .bp { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bp.png'); }
        .br { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/br.png'); }
        .bn { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bn.png'); }
        .bb { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bb.png'); }
        .bq { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bq.png'); }
        .bk { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bk.png'); }

        .selected { background-color: var(--highlight) !important; }
        
        /* تلميحات الحركة (النقاط) */
        .hint-dot::after {
            content: ''; width: 26%; height: 26%;
            background: var(--hint); border-radius: 50%;
        }
        .hint-capture::after {
            content: ''; width: 88%; height: 88%;
            border: 0.8vmin solid var(--hint); border-radius: 50%;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="board" id="board"></div>
    </div>

    <script>
        const boardDiv = document.getElementById('board');
        let selectedIdx = null, legalMoves = [], turn = 'w';

        let layout = [
            'br','bn','bb','bq','bk','bb','bn','br',
            'bp','bp','bp','bp','bp','bp','bp','bp',
            ...Array(32).fill(null),
            'wp','wp','wp','wp','wp','wp','wp','wp',
            'wr','wn','wb','wq','wk','wb','wn','wr'
        ];

        function render() {
            boardDiv.innerHTML = '';
            for(let i=0; i<64; i++) {
                const r = Math.floor(i/8), c = i%8;
                const sq = document.createElement('div');
                sq.className = `square ${(r+c)%2===0?'light':'dark'}`;
                
                // إظهار الإحداثيات كما في الصورة الأصلية
                if(c === 0) sq.setAttribute('data-r', 8-r);
                if(r === 7) sq.setAttribute('data-c', String.fromCharCode(97+c));

                if(layout[i]) {
                    const p = document.createElement('div');
                    p.className = `piece ${layout[i]}`;
                    sq.appendChild(p);
                }

                if(selectedIdx === i) sq.classList.add('selected');
                if(legalMoves.includes(i)) sq.classList.add(layout[i] ? 'hint-capture' : 'hint-dot');

                sq.onclick = () => handleClick(i);
                boardDiv.appendChild(sq);
            }
        }

        function handleClick(i) {
            if(selectedIdx !== null && legalMoves.includes(i)) {
                layout[i] = layout[selectedIdx];
                layout[selectedIdx] = null;
                selectedIdx = null; legalMoves = [];
                turn = turn === 'w' ? 'b' : 'w';
            } else if(layout[i] && layout[i][0] === turn) {
                selectedIdx = i;
                calculateMoves(i);
            } else {
                selectedIdx = null; legalMoves = [];
            }
            render();
        }

        function calculateMoves(from) {
            legalMoves = [];
            for(let to=0; to<64; to++) {
                if(checkLogic(from, to)) legalMoves.push(to);
            }
        }

        function checkLogic(from, to) {
            const fR = Math.floor(from/8), fC = from%8, tR = Math.floor(to/8), tC = to%8;
            const dR = Math.abs(fR-tR), dC = Math.abs(fC-tC), p = layout[from], target = layout[to];
            if(target && target[0] === turn) return false;
            if(target && target[1] === 'k') return false;

            switch(p[1]) {
                case 'p':
                    const dir = p[0] === 'w' ? -1 : 1;
                    if(fC === tC && !target) {
                        if(tR-fR === dir) return true;
                        if((fR===1||fR===6) && tR-fR === 2*dir && !layout[from + 8*dir]) return true;
                    }
                    return (dC === 1 && tR-fR === dir && target);
                case 'n': return (dR === 2 && dC === 1) || (dR === 1 && dC === 2);
                case 'b': return dR === dC && isClear(fR, fC, tR, tC);
                case 'r': return (fR === tR || fC === tC) && isClear(fR, fC, tR, tC);
                case 'q': return (dR === dC || fR === tR || fC === tC) && isClear(fR, fC, tR, tC);
                case 'k': return dR <= 1 && dC <= 1;
            }
            return false;
        }

        function isClear(fR, fC, tR, tC) {
            const sR = fR === tR ? 0 : (tR > fR ? 1 : -1), sC = fC === tC ? 0 : (tC > fC ? 1 : -1);
            let r = fR + sR, c = fC + sC;
            while(r !== tR || c !== tC) { if(layout[r*8 + c]) return false; r += sR; c += sC; }
            return true;
        }

        render();
    </script>
</body>
</html>
