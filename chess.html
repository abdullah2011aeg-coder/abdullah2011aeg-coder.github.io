<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGG15 - شطرنج المحترفين</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        /* نظام الألوان الخاص بـ Chess.com */
        :root {
            --bg-dark: #262421;
            --sidebar-bg: #21201d;
            --green-primary: #81b64c;
            --green-hover: #95c95d;
            --text-gray: #bababa;
            --border: #312e2b;
        }

        body { background-color: var(--bg-dark); color: var(--text-gray); margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }

        /* القائمة الجانبية اليمنى (الأيقونات) */
        .sidebar { width: 120px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; align-items: center; border-left: 1px solid var(--border); padding-top: 15px; }
        .sidebar-item { width: 100%; padding: 20px 0; text-align: center; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .sidebar-item:hover { background: #2b2926; color: #fff; }
        .logo { color: var(--green-primary); font-weight: bold; font-size: 18px; margin-bottom: 20px; }

        /* منطقة الرقعة (الوسط) */
        .game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; position: relative; }
        #board { width: 88vmin; height: 88vmin; max-width: 620px; max-height: 620px; box-shadow: 0 10px 50px rgba(0,0,0,0.6); }

        /* لوحة التحليل والأدوات (اليسار) */
        .analysis-sidebar { width: 340px; background-color: var(--bg-dark); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .panel-header { font-size: 20px; color: #fff; margin-bottom: 20px; font-weight: bold; }
        
        .tab-btn { background: var(--border); color: var(--text-gray); border: none; padding: 12px; border-radius: 4px; cursor: pointer; margin-bottom: 8px; text-align: right; font-size: 14px; width: 100%; }
        .tab-btn:hover { background: #3c3934; }
        
        .play-btn { background: var(--green-primary); color: #fff; border: none; padding: 18px; border-radius: 5px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: auto; border-bottom: 4px solid #5d8a32; }
        .play-btn:hover { background: var(--green-hover); }

        /* تخصيص مربعات الرقعة */
        .white-1e1d7 { background-color: #ebecd0 !important; }
        .black-3c85d { background-color: #779556 !important; }

        /* هوية المستخدمين */
        .player-tag { display: flex; align-items: center; gap: 10px; width: 88vmin; max-width: 620px; padding: 8px 0; font-size: 14px; }
        .avatar { width: 32px; height: 32px; background: #454241; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ABGG15</div>
        <div class="sidebar-item">♟ العب</div>
        <div class="sidebar-item">🧩 الألغاز</div>
        <div class="sidebar-item">🎓 تعلّم</div>
        <div class="sidebar-item">📺 مشاهدة</div>
    </div>

    <div class="analysis-sidebar">
        <div class="panel-header">🔍 تحليل المباراة</div>
        <button class="tab-btn">📁 فتح ملف PGN</button>
        <button class="tab-btn">🧭 استكشف الافتتاحيات</button>
        <button class="tab-btn" onclick="game.undo(); board.position(game.fen());">↩ تراجع خطوة</button>
        <button class="tab-btn" onclick="board.flip()">🔄 قلب الرقعة</button>
        
        <div style="background: var(--sidebar-bg); flex: 0.6; margin-top: 10px; border-radius: 5px; padding: 10px; font-size: 13px; color: #777;">
            تحليل المحرك جاهز...
        </div>

        <button class="play-btn" onclick="location.reload()">مباراة جديدة</button>
    </div>

    <div class="game-view">
        <div class="player-tag">
            <div class="avatar"></div> <strong>الخصم (كمبيوتر)</strong>
        </div>

        <div id="board"></div>

        <div class="player-tag">
            <div class="avatar" style="background: #fff;"></div> <strong>أنت (ABGG15)</strong>
        </div>
    </div>

<script>
    // إعدادات المحرك والقواعد
    var board = null;
    var game = new Chess();

    function onDragStart (source, piece) {
        // منع تحريك القطع إذا انتهت اللعبة أو لم يكن دور اللاعب
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    }

    function onDrop (source, target) {
        // فحص قانونية الحركة
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback'; // العودة إذا كانت الحركة غير قانونية
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        // سحب صور القطع الأصلية
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };

    board = Chessboard('board', config);
    $(window).resize(board.resize); // جعل الرقعة متجاوبة مع حجم الشاشة
</script>
</body>
</html>
