<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين - نسخة السحب والأنيميشن</title>
    <style>
        :root {
            --bg: #312e2b;
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --highlight: rgba(246, 246, 105, 0.8);
            --hint: rgba(0, 0, 0, 0.1);
        }

        body { 
            background-color: var(--bg); margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }

        .board-wrapper {
            position: relative; width: 90vmin; height: 90vmin;
            max-width: 700px; max-height: 700px;
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .board {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            width: 100%; height: 100%;
        }

        .square {
            position: relative; display: flex; justify-content: center; align-items: center;
        }

        .light { background-color: var(--white-sq); }
        .dark { background-color: var(--black-sq); }

        /* تنسيق القطع مع الأنيميشن */
        .piece {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            z-index: 10; cursor: grab;
            transition: transform 0.2s ease-out; /* أنيميشن الحركة */
        }

        .piece:active { cursor: grabbing; z-index: 100; }

        /* روابط قطع Neo */
        .wp { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wp.png'); }
        .wr { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wr.png'); }
        .wn { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wn.png'); }
        .wb { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wb.png'); }
        .wq { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wq.png'); }
        .wk { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/wk.png'); }
        .bp { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bp.png'); }
        .br { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/br.png'); }
        .bn { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bn.png'); }
        .bb { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bb.png'); }
        .bq { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bq.png'); }
        .bk { background-image: url('https://www.chess.com/chess-themes/pieces/neo/150/bk.png'); }

        .controls { margin-top: 20px; display: flex; gap: 15px; }
        .btn {
            background: #81b64c; color: white; border: none; padding: 10px 25px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s; box-shadow: 0 4px #5d8a32;
        }
        .btn:hover { background: #95c95d; }
        .btn:active { box-shadow: 0 0; transform: translateY(4px); }

        .hint-dot::after { content: ''; width: 25%; height: 25%; background: var(--hint); border-radius: 50%; }
    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="board" id="board"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="undo()">↩ تراجع عن الحركة</button>
        <button class="btn" style="background:#454241; box-shadow: 0 4px #2a2827;" onclick="resetGame()">🔄 إعادة البدء</button>
    </div>

    <script>
        const boardDiv = document.getElementById('board');
        let turn = 'w', selectedIdx = null, history = [];
        
        let layout = [
            'br','bn','bb','bq','bk','bb','bn','br',
            'bp','bp','bp','bp','bp','bp','bp','bp',
            ...Array(32).fill(null),
            'wp','wp','wp','wp','wp','wp','wp','wp',
            'wr','wn','wb','wq','wk','wb','wn','wr'
        ];

        function render() {
            boardDiv.innerHTML = '';
            layout.forEach((p, i) => {
                const sq = document.createElement('div');
                sq.className = `square ${(Math.floor(i/8)+i%8)%2===0?'light':'dark'}`;
                sq.dataset.index = i;

                if(p) {
                    const div = document.createElement('div');
                    div.className = `piece ${p}`;
                    div.draggable = true;
                    div.ondragstart = (e) => {
                        if(p[0] !== turn) { e.preventDefault(); return; }
                        selectedIdx = i;
                        e.dataTransfer.setData('text', i);
                    };
                    sq.appendChild(div);
                }

                sq.ondragover = (e) => e.preventDefault();
                sq.ondrop = (e) => {
                    const from = e.dataTransfer.getData('text');
                    handleMove(parseInt(from), i);
                };

                boardDiv.appendChild(sq);
            });
        }

        function handleMove(from, to) {
            if(from === to) return;
            // حفظ الحالة للتراجع
            history.push([...layout]);
            
            // تحريك القطعة
            layout[to] = layout[from];
            layout[from] = null;
            turn = turn === 'w' ? 'b' : 'w';
            render();
        }

        function undo() {
            if(history.length > 0) {
                layout = history.pop();
                turn = turn === 'w' ? 'b' : 'w';
                render();
            }
        }

        function resetGame() {
            location.reload();
        }

        render();
    </script>
</body>
</html>
