</a>    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-O Professional: Chess Clock Edition</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --text-color: #e0e0e0;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #setup-screen {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .menu-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mode-selector, .time-selector {
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 10px; font-weight: bold; }

        select, input {
            background: #222;
            color: white;
            border: 1px solid var(--neon-blue);
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #game-interface {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .chess-clocks {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 20px;
        }

        .clock {
            flex: 1;
            padding: 15px;
            background: #111;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .clock.active-blue { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .clock.active-red { border-color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }

        .time-display {
            font-size: 2.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .player-label { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }

        .blue-text { color: var(--neon-blue); }
        .red-text { color: var(--neon-red); }

        .warning { animation: blink 0.5s infinite; color: #ff0000 !important; }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        .board {
            display: grid;
            gap: 10px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .cell {
            background: rgba(255, 255, 255, 0.05);
            aspect-ratio: 1/1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #222;
            position: relative;
            user-select: none;
        }

        .cell:hover { background: rgba(255, 255, 255, 0.1); }
        .cell.x { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .cell.o { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }

        .status-bar {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none;
            text-align: center;
            padding: 20px;
        }

        #overlay h2 { font-size: 3rem; margin-bottom: 20px; }
        #insult { font-size: 1.5rem; font-style: italic; color: #ff3366; margin-bottom: 30px; max-width: 600px; font-weight: bold; }

        .win-glow {
            animation: win-pulse 0.5s infinite alternate;
            background: rgba(0, 255, 0, 0.2) !important;
        }

        @keyframes win-pulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.05); filter: brightness(1.3); }
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen">
        <h1>X-O ULTIMATE</h1>
        <div class="menu-card">
            <div class="mode-selector">
                <label>اختر مستوى التحدي:</label>
                <select id="game-mode">
                    <option value="3">عادي (3x3)</option>
                    <option value="4">محترفين (4x4)</option>
                    <option value="hacker">هاكرز (4x4 + مسح واختراق)</option>
                </select>
            </div>
            <div class="time-selector">
                <label>وقت كل لاعب (بالدقائق):</label>
                <input type="number" id="time-input" value="1" min="0.5" step="0.5">
            </div>
            <button onclick="startGame()">ابدأ المعركة</button>
        </div>
    </div>

    <!-- Game Interface -->
    <div id="game-interface">
        <div class="chess-clocks">
            <div id="clock-X" class="clock">
                <div class="player-label blue-text">لاعب X (أزرق)</div>
                <div id="time-X" class="time-display blue-text">00:00</div>
            </div>
            <div id="clock-O" class="clock">
                <div class="player-label red-text">لاعب O (أحمر)</div>
                <div id="time-O" class="time-display red-text">00:00</div>
            </div>
        </div>

        <div id="board" class="board"></div>
        <div class="status-bar" id="status">دور اللاعب X</div>
        <button onclick="resetGame()" style="width:100%; margin-top:20px; font-size: 1rem; padding: 8px;">انسحاب وإعادة</button>
    </div>

    <!-- End Game Overlay -->
    <div id="overlay">
        <h2 id="winner-text">فاز X!</h2>
        <p id="insult"></p>
        <button onclick="location.reload()">العودة للقائمة</button>
    </div>

    <script>
        let board = [];
        let currentPlayer = 'X';
        let isGameActive = false;
        let mode = '3';
        let timers = { X: 0, O: 0 };
        let timerInterval;

        // قواميس العبارات المستفزة حسب نوع الخسارة واللفل
        const timeoutInsults = [
            "انتهى الوقت يا بطيء.. اذهب للعب السلم والثعبان أفضل لك!",
            "هل كنت نائماً؟ حتى السلحفاة أسرع منك في اتخاذ القرار!",
            "عقلك يحتاج إلى تحديث، وقتك انتهى يا بطيء الاستيعاب.",
            "أنت بطيء جداً، جدتي تلعب أسرع منك بمرتين!"
        ];

        const proInsults = [
            "واضح أن لفل المحترفين كبير جداً على حجم ذكائك!",
            "لقد تم سحقك بـ 4 حركات متتالية.. اذهب وابكِ في الزاوية.",
            "هل هذا كل ما لديك؟ خسارة مخزية ومستحقة.",
            "نصيحة: امسح اللعبة وعد لطور الأطفال (3x3)."
        ];

        const hackerInsults = [
            "تم اختراق نظامك بنجاح! لقد تم مسح حجر كبريائك!",
            "حتى مع ميزة المسح خسرت؟ أنت عار على مجتمع الهاكرز والبرمجة.",
            "لقد تم تعديل ملفات عقلك وحذفها.. فوز ساحق ومهين للأذكياء فقط!",
            "Error 404: كرامتك غير موجودة بعد هذه الخسارة المهينة."
        ];

        function startGame() {
            mode = document.getElementById('game-mode').value;
            const minutes = parseFloat(document.getElementById('time-input').value);
            timers.X = minutes * 60;
            timers.O = minutes * 60;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';

            initBoard();
            updateTimerDisplay();
            isGameActive = true;
            startTimer();
        }

        function initBoard() {
            const boardElement = document.getElementById('board');
            const size = (mode === '3') ? 3 : 4;
            boardElement.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            boardElement.innerHTML = '';
            board = Array(size * size).fill('');

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardElement.appendChild(cell);
            }
        }

        function handleCellClick(index) {
            if (!isGameActive) return;

            const cells = document.querySelectorAll('.cell');
            const targetPlayer = board[index];
            const isBoardFull = board.every(cell => cell !== '');

            // منطق طور الهاكرز (عندما تمتلئ اللوحة)
            if (mode === 'hacker' && isBoardFull) {
                // يسمح فقط بمسح حجر الخصم وضع حجره مكانه
                if (targetPlayer !== '' && targetPlayer !== currentPlayer) {
                    board[index] = currentPlayer;
                    cells[index].textContent = currentPlayer;
                    cells[index].className = `cell ${currentPlayer.toLowerCase()}`;
                    
                    if (checkWin()) {
                        endGame(false);
                    } else {
                        switchPlayer();
                    }
                }
                return; 
            }

            // اللعب العادي في المربعات الفارغة فقط
            if (board[index] !== '') return;

            board[index] = currentPlayer;
            cells[index].textContent = currentPlayer;
            cells[index].classList.add(currentPlayer.toLowerCase());

            if (checkWin()) {
                endGame(false);
            } else if (board.every(cell => cell !== '') && mode !== 'hacker') {
                endGame(true);
            } else {
                switchPlayer();
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = `دور اللاعب ${currentPlayer}`;
            document.getElementById('clock-X').classList.toggle('active-blue', currentPlayer === 'X');
            document.getElementById('clock-O').classList.toggle('active-red', currentPlayer === 'O');
        }

        function startTimer() {
            document.getElementById('clock-X').classList.add('active-blue');
            timerInterval = setInterval(() => {
                timers[currentPlayer]--;
                updateTimerDisplay();

                if (timers[currentPlayer] <= 0) {
                    clearInterval(timerInterval);
                    timeoutLoss();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            ['X', 'O'].forEach(p => {
                const min = Math.floor(timers[p] / 60);
                const sec = timers[p] % 60;
                const display = document.getElementById(`time-${p}`);
                display.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                
                if (timers[p] <= 10) {
                    display.classList.add('warning');
                } else {
                    display.classList.remove('warning');
                }
            });
        }

        function timeoutLoss() {
            isGameActive = false;
            const loser = currentPlayer;
            
            document.getElementById('winner-text').textContent = `خسارة مخزية بالوقت لـ ${loser}!`;
            document.getElementById('winner-text').style.color = 'var(--neon-red)';
            document.getElementById('insult').textContent = timeoutInsults[Math.floor(Math.random() * timeoutInsults.length)];
            document.getElementById('overlay').style.display = 'flex';
        }

        function checkWin() {
            const size = (mode === '3') ? 3 : 4;
            const winConditions = getWinConditions(size);
            
            return winConditions.some(condition => {
                if (condition.every(index => board[index] === currentPlayer)) {
                    highlightWinningCells(condition);
                    return true;
                }
                return false;
            });
        }

        function getWinConditions(size) {
            const conditions = [];
            // الصفوف
            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) row.push(i * size + j);
                conditions.push(row);
            }
            // الأعمدة
            for (let i = 0; i < size; i++) {
                const col = [];
                for (let j = 0; j < size; j++) col.push(j * size + i);
                conditions.push(col);
            }
            // الأقطار
            const diag1 = [], diag2 = [];
            for (let i = 0; i < size; i++) {
                diag1.push(i * size + i);
                diag2.push(i * size + (size - 1 - i));
            }
            conditions.push(diag1, diag2);
            return conditions;
        }

        function highlightWinningCells(indices) {
            const cells = document.querySelectorAll('.cell');
            indices.forEach(i => cells[i].classList.add('win-glow'));
        }

        function endGame(draw) {
            isGameActive = false;
            clearInterval(timerInterval);
            const overlay = document.getElementById('overlay');
            const winText = document.getElementById('winner-text');
            const insult = document.getElementById('insult');

            if (draw) {
                winText.textContent = "تعادل ممل!";
                insult.textContent = "لا يوجد فائز هنا، مجرد مضيعة أخرى للوقت البشري.";
                winText.style.color = '#aaa';
            } else {
                winText.textContent = `سحقاً لكم.. الفوز للاعب ${currentPlayer}!`;
                winText.style.color = currentPlayer === 'X' ? 'var(--neon-blue)' : 'var(--neon-red)';
                
                // اختيار عبارة الإهانة المناسبة بناءً على رتبة الفوز الحالية
                if (mode === '3') {
                    insult.textContent = "فوز عادي جداً.. جرب لفل المحترفين لو كنت تملك الجرأة.";
                } else if (mode === '4') {
                    insult.textContent = proInsults[Math.floor(Math.random() * proInsults.length)];
                } else if (mode === 'hacker') {
                    insult.textContent = hackerInsults[Math.floor(Math.random() * hackerInsults.length)];
                }
            }
            overlay.style.display = 'flex';
        }

        function resetGame() {
            location.reload();
        }
    </script>
</body>
</html>
