<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>3D Flight Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px;
        }
        #speedometer {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-size: 24px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="instructions">
    <b>التحكم:</b><br>
    Space: تشغيل المحرك وزيادة السرعة للإقلاع<br>
    W / S: رفع أو خفض مقدمة الطائرة<br>
    A / D: الالتفاف يميناً ويساراً
</div>
<div id="speedometer">السرعة: 0</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // الإعدادات الأساسية
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // الإضاءة
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // الأرضية (المطار)
    const grid = new THREE.GridHelper(2000, 100, 0x000000, 0x444444);
    scene.add(grid);

    // بناء طائرة بسيطة (مجموعة صناديق)
    const airplane = new THREE.Group();
    
    // جسم الطائرة
    const bodyGeo = new THREE.BoxGeometry(0.5, 0.5, 2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    airplane.add(body);

    // الأجنحة
    const wingGeo = new THREE.BoxGeometry(3, 0.1, 0.7);
    const wing = new THREE.Mesh(wingGeo, bodyMat);
    airplane.add(wing);

    airplane.position.y = 0.25; // رفعها قليلاً عن الأرض
    scene.add(airplane);

    // متغيرات الحركة
    let speed = 0;
    const keys = {};
    let pitch = 0; // الانحناء للأعلى والأسفل
    let yaw = 0;   // الالتفاف

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function updatePhysics() {
        // زيادة السرعة عند الضغط على Space
        if (keys['Space']) {
            speed += 0.005;
        } else {
            speed *= 0.99; // احتكاك بسيط لتقليل السرعة
        }

        // التحكم في الاتجاهات (فقط إذا كانت هناك سرعة)
        if (speed > 0.01) {
            if (keys['KeyW']) airplane.rotation.x -= 0.02;
            if (keys['KeyS']) airplane.rotation.x += 0.02;
            if (keys['KeyA']) airplane.rotation.y += 0.02;
            if (keys['KeyD']) airplane.rotation.y -= 0.02;
        }

        // تحريك الطائرة للأمام بناءً على اتجاهها
        airplane.translateZ(speed);

        // الكاميرا تتبع الطائرة
        const relativeCameraOffset = new THREE.Vector3(0, 1.5, -5);
        const cameraOffset = relativeCameraOffset.applyMatrix4(airplane.matrixWorld);
        camera.position.x = cameraOffset.x;
        camera.position.y = cameraOffset.y;
        camera.position.z = cameraOffset.z;
        camera.lookAt(airplane.position);

        document.getElementById('speedometer').innerText = `السرعة: ${Math.round(speed * 1000)}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
